<div class="animate-slide-up flex flex-col gap-5">
  <div class="bg-white/90 dark:bg-slate-900/90 rounded-2xl border border-slate-200/70 dark:border-slate-800 shadow-sm p-4 backdrop-blur-xl">
    <div class="grid grid-cols-1 sm:grid-cols-[1fr_auto] items-start gap-4">
      <div class="flex items-center gap-3.5 min-w-0">
        <div class="w-14 h-14 rounded-2xl bg-orange-500 flex items-center justify-center text-white shrink-0 shadow-md shadow-orange-500/20">
          <i data-lucide="user-round" class="w-6 h-6"></i>
        </div>
        <div class="min-w-0">
          <p class="text-[9px] font-black uppercase tracking-widest text-slate-400 mb-0.5">Profil Santri</p>
          <h2 data-name class="text-base sm:text-lg font-black text-slate-900 dark:text-white leading-snug break-words"></h2>
          <div class="flex items-center gap-1.5 mt-1.5 flex-wrap">
            <span data-kelas-text class="px-2 py-0.5 rounded-md bg-slate-100 dark:bg-slate-800 text-[9px] font-black text-slate-600 dark:text-slate-300 uppercase text-center shrink-0"></span>
            <span data-program-text class="px-2 py-0.5 rounded-md bg-slate-100 dark:bg-slate-800 text-[9px] font-black text-slate-600 dark:text-slate-300 uppercase truncate max-w-[150px]"></span>
          </div>
        </div>
      </div>
      <div class="flex sm:flex-col gap-1.5 sm:items-end shrink-0 flex-wrap">
        <span data-status-badge></span>
        <span data-perpulangan-badge></span>
      </div>
    </div>
    
    <div class="grid grid-cols-3 gap-2.5 mt-4">
      <div class="rounded-2xl bg-slate-50 dark:bg-slate-950/40 border border-slate-100 dark:border-slate-800/80 p-3 text-center transition-all hover:scale-[1.02]">
        <p class="text-[9px] font-black uppercase tracking-wider text-slate-400 dark:text-slate-500">Nilai</p>
        <p data-nilai class="text-xl font-black text-slate-900 dark:text-white tabular-nums mt-0.5"></p>
      </div>
      <div class="rounded-2xl bg-orange-50/50 dark:bg-orange-950/10 border border-orange-100/50 dark:border-orange-500/10 p-3 text-center transition-all hover:scale-[1.02]">
        <p class="text-[9px] font-black uppercase tracking-wider text-orange-500/80 dark:text-orange-400/80">Ziyadah</p>
        <p data-ziyadah class="text-xl font-black text-orange-600 dark:text-orange-400 tabular-nums mt-0.5"></p>
      </div>
      <div class="rounded-2xl bg-slate-50 dark:bg-slate-950/40 border border-slate-100 dark:border-slate-800/80 p-3 text-center transition-all hover:scale-[1.02]">
        <p class="text-[9px] font-black uppercase tracking-wider text-slate-400 dark:text-slate-500">Setoran</p>
        <p data-total-setoran class="text-xl font-black text-slate-900 dark:text-white tabular-nums mt-0.5"></p>
      </div>
    </div>
  </div>
  
  <div class="grid grid-cols-1 lg:grid-cols-2 gap-5">
    <div class="bg-white/90 dark:bg-slate-900/90 rounded-2xl border border-slate-200/70 dark:border-slate-800 shadow-sm p-4 backdrop-blur-xl">
      <h4 class="font-black text-sm mb-3 text-slate-800 dark:text-white">Target Wajib</h4>
      <div data-progres-juz class="space-y-2"></div>
      <div data-ziyadah-section class="hidden mt-5">
        <h4 class="font-black text-sm mb-3 text-slate-800 dark:text-white">Progres Ziyadah</h4>
        <div data-progres-ziyadah></div>
      </div>
    </div>
    <div class="bg-white/90 dark:bg-slate-900/90 rounded-2xl border border-slate-200/70 dark:border-slate-800 shadow-sm p-4 backdrop-blur-xl">
      <h4 class="font-black text-sm mb-3 text-slate-800 dark:text-white">Fokus Juz</h4>
      <div id="focus-juz-container" class="flex flex-col items-center"></div>
    </div>
  </div>
  
  <div class="grid grid-cols-1 lg:grid-cols-2 gap-5">
    <div class="bg-white/90 dark:bg-slate-900/90 rounded-2xl border border-slate-200/70 dark:border-slate-800 shadow-sm p-4 backdrop-blur-xl">
      <h4 class="font-black text-sm mb-3 text-slate-800 dark:text-white">Komposisi</h4>
      <div class="h-48">
        <canvas id="compositionChart"></canvas>
      </div>
    </div>
    <div class="bg-white/90 dark:bg-slate-900/90 rounded-2xl border border-slate-200/70 dark:border-slate-800 shadow-sm p-4 backdrop-blur-xl">
      <h4 class="font-black text-sm mb-3 text-slate-800 dark:text-white">Aktivitas Terkini</h4>
      <table class="w-full">
        <tbody data-aktivitas-terkini></tbody>
      </table>
    </div>
  </div>
  
  <div class="bg-white/90 dark:bg-slate-900/90 rounded-2xl border border-slate-200/70 dark:border-slate-800 shadow-sm p-4 backdrop-blur-xl">
    <h4 class="font-black text-sm mb-3 text-slate-800 dark:text-white">Peta Juz</h4>
    <div id="dynamic-juz-grid" class="grid grid-cols-1 md:grid-cols-2 gap-3"></div>
  </div>
</div>
