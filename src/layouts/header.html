<header class="flex justify-between items-center gap-3 sm:gap-4 animate-slide-up relative z-40 w-full delay-100ms">
  <div class="flex items-center h-11 gap-3 min-w-0 self-center pl-1.5 sm:pl-3">
    <img
      src="assets/branding/Primary Logo.webp"
      alt="Syamsa"
      class="syamsa-header-logo"
    />
  </div>

  <div class="header-actions-flex-container flex items-center gap-2 sm:gap-3 shrink-0 self-center">
    <div class="hidden sm:flex items-center gap-1.5 px-3.5 py-2.5 rounded-full bg-white/60 dark:bg-slate-900/60 backdrop-blur-xl border border-slate-200/60 dark:border-slate-800/80 shadow-sm">
      <i data-lucide="clock" class="w-3.5 h-3.5 text-palette-blue"></i>
      <div class="flex items-baseline gap-0.5 tabular-nums">
        <p id="dash-clock" class="text-sm font-black text-slate-700 dark:text-slate-200 leading-none">21:27</p>
        <p id="dash-clock-sec" class="text-[10px] font-bold text-slate-400 leading-none">24</p>
      </div>
    </div>

    <button onclick="window.switchTab('notifications')" class="relative p-2.5 rounded-full bg-white/60 dark:bg-slate-900/60 backdrop-blur-xl border border-slate-200/60 dark:border-slate-800/80 shadow-sm text-slate-500 dark:text-slate-400 hover:text-palette-blue hover:scale-105 active:scale-95 transition-all duration-300 group focus:outline-none focus-visible:ring-2 focus-visible:ring-palette-blue" aria-label="Buka notifikasi" title="Notifikasi">
      <i data-lucide="bell" class="w-5 h-5" aria-hidden="true"></i>
      <span id="notif-badge" class="hidden absolute top-1.5 right-1.5 w-2 h-2 rounded-full bg-red-500" aria-hidden="true"></span>
    </button>

    <button onclick="switchTab('profile')" class="relative shrink-0 rounded-full group focus:outline-none focus-visible:ring-2 focus-visible:ring-palette-blue active:scale-95 transition-all duration-300" aria-label="Buka profil" title="Profil">
      <div class="absolute inset-0 rounded-full bg-emerald-400 blur-md opacity-30 group-hover:opacity-60 transition-opacity duration-300"></div>
      <div id="header-avatar" class="relative w-10 h-10 rounded-full bg-emerald-500 flex items-center justify-center text-white font-black text-xs shadow-md z-10 transition-transform group-hover:scale-105">
        AA
      </div>
    </button>

    <span id="header-user-name" class="hidden">Andi</span>
    <span id="profile-role" class="hidden">2 A</span>
  </div>
</header>
