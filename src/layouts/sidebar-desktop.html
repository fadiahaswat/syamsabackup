<!-- Desktop Sidebar Navigation -->
<!-- Extracted from index.html for modular architecture -->
<!-- Brand -->
<div class="p-6 flex flex-col items-center border-b border-slate-100 dark:border-slate-800/60 relative overflow-hidden">
  <!-- Main Brand Logo -->
  <div class="w-full flex justify-center py-2">
    <img
      src="assets/branding/Primary Logo.webp"
      class="h-10 w-auto object-contain dark:brightness-200 dark:contrast-125 transition-all duration-300 hover:scale-105"
      alt="Syamsa Logo"
    />
  </div>
</div>

<!-- Nav items -->
<div class="sidebar-nav-list flex-1 p-4 flex flex-col gap-2 overflow-y-auto" role="navigation" aria-label="Sidebar navigasi">
  <button
    onclick="window.switchTab('home')"
    data-target="home"
    aria-current="page"
    class="nav-btn active sidebar-nav-btn group"
    aria-label="Dashboard"
  >
    <i data-lucide="home" class="w-5 h-5 flex-shrink-0 transition-transform group-hover:scale-110"></i>
    <span>Dashboard</span>
  </button>

  <button
    onclick="window.switchTab('tahfizh')"
    data-target="tahfizh"
    aria-current="false"
    class="nav-btn sidebar-nav-btn group"
    aria-label="Tahfizh"
  >
    <i data-lucide="book-open-check" class="w-5 h-5 flex-shrink-0 transition-transform group-hover:scale-110"></i>
    <span>Tahfizh</span>
  </button>

  <button
    onclick="window.switchTab('jurnal')"
    data-target="jurnal"
    aria-current="false"
    class="nav-btn musyrif-only sidebar-nav-btn group"
    aria-label="Jurnal"
  >
    <i data-lucide="clipboard-check" class="w-5 h-5 flex-shrink-0 transition-transform group-hover:scale-110"></i>
    <span>Jurnal</span>
  </button>

  <button
    onclick="window.switchTab('report')"
    data-target="report"
    aria-current="false"
    class="nav-btn sidebar-nav-btn group"
    aria-label="Laporan"
  >
    <i data-lucide="file-bar-chart" class="w-5 h-5 flex-shrink-0 transition-transform group-hover:scale-110"></i>
    <span>Laporan</span>
  </button>

  <button
    onclick="window.switchTab('profile')"
    data-target="profile"
    aria-current="false"
    class="nav-btn sidebar-nav-btn group"
    aria-label="Profil"
  >
    <i data-lucide="user" class="w-5 h-5 flex-shrink-0 transition-transform group-hover:scale-110"></i>
    <span>Profil</span>
  </button>
</div>

<!-- User info -->
<div class="p-4 border-t border-slate-100 dark:border-slate-800/60">
  <div 
    onclick="window.switchTab('profile')"
    class="flex items-center gap-3 p-3 rounded-2xl bg-white/60 dark:bg-slate-800/40 hover:bg-slate-50 dark:hover:bg-slate-800/60 border border-slate-100 dark:border-slate-800/50 shadow-sm cursor-pointer transition-all duration-300 group"
  >
    <div
      class="w-9 h-9 rounded-full bg-emerald-500 flex items-center justify-center text-white font-bold text-sm shadow-sm flex-shrink-0 transition-transform group-hover:scale-105"
      id="sidebar-avatar"
    >
      <i data-lucide="user" class="w-4 h-4"></i>
    </div>
    <div class="min-w-0 flex-1">
      <p class="font-bold text-xs text-slate-800 dark:text-white truncate leading-tight group-hover:text-slate-900 dark:group-hover:text-slate-100 transition-colors" id="sidebar-user-name">
        -
      </p>
      <p class="text-[10px] font-bold text-emerald-500 dark:text-emerald-400 truncate mt-0.5" id="sidebar-class-name">
        -
      </p>
    </div>
    <i data-lucide="chevron-right" class="w-4 h-4 text-slate-300 dark:text-slate-600 transition-transform group-hover:translate-x-0.5"></i>
  </div>
</div>
