<!-- Bottom Navigation Bar - Mobile -->
<!-- Extracted from index.html for modular architecture -->
<nav
  id="bottom-nav"
  class="fixed bottom-6 left-4 right-4 z-50 max-w-md mx-auto pointer-events-none select-none"
  aria-label="Navigasi utama"
>
  <!-- 1. Floating Action Button (FAB) Jurnal Musyrif (Only visible for Musyrif) -->
  <button
    onclick="window.switchTab('jurnal')"
    data-target="jurnal"
    aria-label="Buka Jurnal Musyrif"
    class="musyrif-only absolute w-14 h-14 rounded-full bg-indigo-600 hover:bg-indigo-700 text-white border-4 border-white dark:border-slate-900 flex items-center justify-center pointer-events-auto"
  >
    <i data-lucide="plus" class="w-6 h-6"></i>
  </button>

  <!-- 2. Glassmorphic Navigation Bar Container -->
  <div
    class="nav-container pointer-events-auto bg-white/70 dark:bg-slate-900/70 backdrop-blur-2xl rounded-full shadow-xl shadow-slate-200/30 dark:shadow-black/30 border border-white/50 dark:border-white/10 p-1.5"
  >
    <div class="flex items-center justify-between gap-1">
      <!-- Tab 1: Dashboard -->
      <button
        onclick="window.switchTab('home')"
        data-target="home"
        aria-current="page"
        class="nav-btn active group"
        aria-label="Dashboard"
      >
        <i data-lucide="home"></i>
        <span class="nav-indicator"></span>
      </button>

      <!-- Tab 2: Tahfizh -->
      <button
        onclick="window.switchTab('tahfizh')"
        data-target="tahfizh"
        aria-current="false"
        class="nav-btn group"
        aria-label="Tahfizh"
      >
        <i data-lucide="book-open-check"></i>
        <span class="nav-indicator"></span>
      </button>

      <!-- Dynamic Spacer for Musyrif Jurnal FAB (Only active for Musyrif) -->
      <div class="musyrif-only musyrif-spacer w-14 flex-shrink-0" aria-hidden="true"></div>

      <!-- Tab 3: Laporan -->
      <button
        onclick="window.switchTab('report')"
        data-target="report"
        aria-current="false"
        class="nav-btn group"
        aria-label="Laporan"
      >
        <i data-lucide="file-bar-chart"></i>
        <span class="nav-indicator"></span>
      </button>

      <!-- Tab 4: Profil -->
      <button
        onclick="window.switchTab('profile')"
        data-target="profile"
        aria-current="false"
        class="nav-btn group"
        aria-label="Profil"
      >
        <i data-lucide="user"></i>
        <span class="nav-indicator"></span>
      </button>
    </div>
  </div>
</nav>
