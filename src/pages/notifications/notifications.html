<div
        id="tab-notifications"
        class="tab-content hidden min-h-screen animate-fade-in overflow-y-auto hide-scrollbar"
      >
        <div class="page-container">
          <header class="flex justify-between items-center gap-3 sm:gap-4 animate-slide-up relative z-40 w-full delay-100ms">
            <div class="flex items-center gap-3 min-w-0">
              <button onclick="switchTab('home')" class="relative shrink-0 rounded-full group focus:outline-none focus-visible:ring-2 focus-visible:ring-palette-blue focus-visible:ring-offset-2 dark:focus-visible:ring-offset-slate-900 active:scale-95 transition-all duration-300" aria-label="Kembali ke Dashboard" title="Kembali ke Dashboard">
                <div class="relative w-10 h-10 rounded-full bg-white dark:bg-slate-900 border border-slate-200/70 dark:border-slate-800 flex items-center justify-center text-slate-600 dark:text-slate-300 shadow-sm transition-transform group-hover:scale-105">
                  <i data-lucide="arrow-left" class="w-5 h-5"></i>
                </div>
              </button>

              <div class="flex flex-col justify-center min-w-0">
                <h1 class="text-base sm:text-lg font-black text-slate-900 dark:text-white leading-tight truncate">Kotak Masuk</h1>
                <p class="text-[11px] font-semibold text-slate-500 dark:text-slate-400 mt-0.5 truncate">Notifikasi masuk dari presensi, izin, tahfizh, dan sistem</p>
              </div>
            </div>
            <button onclick="window.markAllNotificationsAsRead(event)" class="inline-flex items-center gap-1.5 px-3 py-2 rounded-full text-[10px] font-black text-white bg-palette-blue hover:bg-palette-deep transition-all shadow-sm active:scale-95 shrink-0" title="Tandai semua dibaca">
              <i data-lucide="check-check" class="w-3.5 h-3.5"></i>
              <span class="hidden xs:inline sm:inline">Semua dibaca</span>
            </button>
          </header>

          <section class="mt-4 bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl rounded-2xl border border-slate-200/70 dark:border-slate-800 shadow-sm overflow-hidden animate-slide-up delay-150ms">
            <div class="px-3 py-2.5 border-b border-slate-100 dark:border-slate-800/70 flex items-center gap-2">
              <div class="w-8 h-8 rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-300 flex items-center justify-center shrink-0">
                <i data-lucide="inbox" class="w-4 h-4"></i>
              </div>
              <div class="flex items-center gap-1.5 overflow-x-auto hide-scrollbar scroll-smooth min-w-0 flex-1">
                <button onclick="window.filterNotifications('all')" id="notif-filter-all" class="notif-filter-btn inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full text-[11px] font-bold transition-all bg-palette-blue text-white shadow-sm active:scale-95 shrink-0">
                  <span>Semua</span><span id="notif-count-all" class="hidden min-w-5 rounded-full bg-white/20 px-1.5 py-0.5 text-[9px] leading-none text-center"></span>
                </button>
                <button onclick="window.filterNotifications('attendance')" id="notif-filter-attendance" class="notif-filter-btn inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full text-[11px] font-bold transition-all bg-slate-50 dark:bg-slate-800/60 text-slate-600 dark:text-slate-300 border border-slate-200/70 dark:border-slate-700/70 hover:bg-white dark:hover:bg-slate-800 active:scale-95 shrink-0">
                  <span>Kehadiran</span><span id="notif-count-attendance" class="hidden min-w-5 rounded-full bg-slate-200/70 dark:bg-slate-700 px-1.5 py-0.5 text-[9px] leading-none text-center"></span>
                </button>
                <button onclick="window.filterNotifications('permit')" id="notif-filter-permit" class="notif-filter-btn inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full text-[11px] font-bold transition-all bg-slate-50 dark:bg-slate-800/60 text-slate-600 dark:text-slate-300 border border-slate-200/70 dark:border-slate-700/70 hover:bg-white dark:hover:bg-slate-800 active:scale-95 shrink-0">
                  <span>Perizinan</span><span id="notif-count-permit" class="hidden min-w-5 rounded-full bg-slate-200/70 dark:bg-slate-700 px-1.5 py-0.5 text-[9px] leading-none text-center"></span>
                </button>
                <button onclick="window.filterNotifications('tahfizh')" id="notif-filter-tahfizh" class="notif-filter-btn inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full text-[11px] font-bold transition-all bg-slate-50 dark:bg-slate-800/60 text-slate-600 dark:text-slate-300 border border-slate-200/70 dark:border-slate-700/70 hover:bg-white dark:hover:bg-slate-800 active:scale-95 shrink-0">
                  <span>Tahfizh</span><span id="notif-count-tahfizh" class="hidden min-w-5 rounded-full bg-slate-200/70 dark:bg-slate-700 px-1.5 py-0.5 text-[9px] leading-none text-center"></span>
                </button>
                <button onclick="window.filterNotifications('system')" id="notif-filter-system" class="notif-filter-btn inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full text-[11px] font-bold transition-all bg-slate-50 dark:bg-slate-800/60 text-slate-600 dark:text-slate-300 border border-slate-200/70 dark:border-slate-700/70 hover:bg-white dark:hover:bg-slate-800 active:scale-95 shrink-0">
                  <span>Sistem</span><span id="notif-count-system" class="hidden min-w-5 rounded-full bg-slate-200/70 dark:bg-slate-700 px-1.5 py-0.5 text-[9px] leading-none text-center"></span>
                </button>
                <button onclick="window.filterNotifications('pembinaan')" id="notif-filter-pembinaan" class="notif-filter-btn inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full text-[11px] font-bold transition-all bg-slate-50 dark:bg-slate-800/60 text-slate-600 dark:text-slate-300 border border-slate-200/70 dark:border-slate-700/70 hover:bg-white dark:hover:bg-slate-800 active:scale-95 shrink-0">
                  <span>Pembinaan</span><span id="notif-count-pembinaan" class="hidden min-w-5 rounded-full bg-slate-200/70 dark:bg-slate-700 px-1.5 py-0.5 text-[9px] leading-none text-center"></span>
                </button>
              </div>
            </div>

            <div id="tab-notification-list" class="divide-y divide-slate-100 dark:divide-slate-800/60">
              <div id="notif-loading-state" class="p-8 text-center text-slate-400 dark:text-slate-500">
                <i data-lucide="loader-2" class="w-7 h-7 mx-auto mb-2 opacity-50 animate-spin"></i>
                <p class="text-xs font-semibold">Memuat notifikasi...</p>
              </div>
              <div id="notif-empty-state" class="hidden p-8 text-center">
                <div class="w-14 h-14 mx-auto mb-3 rounded-2xl bg-emerald-50 dark:bg-emerald-900/20 text-emerald-500 flex items-center justify-center">
                  <i data-lucide="bell-off" class="w-6 h-6"></i>
                </div>
                <h3 class="text-sm font-bold text-slate-700 dark:text-slate-300 mb-1">Belum ada notifikasi</h3>
                <p class="text-xs text-slate-500 dark:text-slate-400">Pemberitahuan presensi, izin, tahfizh, dan sistem akan muncul di sini.</p>
              </div>
            </div>
          </section>
        </div>
      </div>
