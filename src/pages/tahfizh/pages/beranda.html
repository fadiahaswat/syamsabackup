<section id="tahfizh-page-beranda" class="tahfizh-page-content space-y-4">
  <div id="tahfizh-hero-card-wrapper" class="relative z-30">
    <div id="tahfizh-hero-card" class="tahfizh-home-hero relative overflow-hidden rounded-2xl bg-slate-950 p-4 text-white shadow-lg shadow-slate-950/20 animate-slide-up delay-120ms">
      <img src="assets/icons/icon.webp" class="absolute -right-10 -top-12 h-48 w-48 rotate-[14deg] select-none opacity-[0.06] pointer-events-none sm:h-64 sm:w-64" alt="" />
      <div class="relative z-10 grid gap-4 lg:grid-cols-[minmax(0,1fr)_auto] lg:items-center">
        <div class="tahfizh-hero-copy min-w-0">
          <div class="mb-3 flex items-center gap-3">
            <div class="tahfizh-hero-logo flex h-11 w-11 shrink-0 items-center justify-center rounded-2xl bg-orange-500 text-white shadow-sm shadow-orange-500/25 ring-1 ring-white/10">
              <i data-lucide="book-open-check" class="h-5 w-5"></i>
            </div>
            <div class="min-w-0">
              <span class="inline-flex items-center gap-1.5 rounded-lg border border-orange-300/20 bg-orange-400/15 px-2.5 py-1 text-xs font-semibold text-orange-100">
                <span class="h-1.5 w-1.5 rounded-full bg-orange-300"></span>
                Beranda Tahfizh
              </span>
              <h2 class="mt-1 truncate text-xl font-black leading-tight tracking-tight sm:text-2xl">Pantau Hafalan Kelas</h2>
            </div>
          </div>
          <p class="max-w-2xl text-xs font-bold leading-relaxed text-slate-300 sm:text-sm">
            Ringkasan capaian mutqin, target perpulangan, aktivitas setoran, dan santri prioritas dalam satu halaman kerja.
          </p>
        </div>

        <div class="tahfizh-hero-actions grid grid-cols-[1fr_auto] gap-2 sm:flex sm:items-center">
          <button onclick="window.switchTahfizhSubTab('analisis')" class="tahfizh-hero-secondary flex h-12 items-center justify-center gap-2 rounded-xl border border-white/10 bg-white/10 px-3 text-xs font-semibold text-white transition-all hover:bg-white/15 active:scale-95" title="Analisis santri" aria-label="Buka analisis santri">
            <i data-lucide="user-search" class="h-4 w-4"></i>
            <span class="hidden sm:inline">Analisis</span>
          </button>
          <button onclick="window.switchTahfizhSubTab('form')" class="tahfizh-hero-action flex h-12 items-center justify-center gap-2 rounded-xl bg-white px-4 text-xs font-black text-orange-600 shadow-sm transition-all hover:scale-[1.03] active:scale-95" title="Input setoran" aria-label="Input setoran hafalan">
            <i data-lucide="plus" class="h-4 w-4"></i>
            <span>Input</span>
          </button>
        </div>
      </div>

      <div class="tahfizh-hero-stats relative z-10 mt-4 grid grid-cols-3 gap-2">
        <div class="tahfizh-stat-pill rounded-2xl border border-white/10 bg-white/10 p-3">
          <div class="mb-1 flex items-center gap-1.5 text-slate-300">
            <i data-lucide="users" class="h-3.5 w-3.5"></i>
            <span class="text-xs font-semibold">Aktif</span>
          </div>
          <p data-tahfizh-stat="aktif" class="truncate text-base font-bold leading-none text-white">0</p>
        </div>
        <div class="tahfizh-stat-pill rounded-2xl border border-emerald-300/20 bg-emerald-400/10 p-3">
          <div class="mb-1 flex items-center gap-1.5 text-emerald-200">
            <i data-lucide="badge-check" class="h-3.5 w-3.5"></i>
            <span class="text-xs font-semibold">Tuntas</span>
          </div>
          <p data-tahfizh-stat="tuntas" class="truncate text-base font-bold leading-none text-white">0</p>
        </div>
        <div class="tahfizh-stat-pill rounded-2xl border border-amber-300/20 bg-amber-400/10 p-3">
          <div class="mb-1 flex items-center gap-1.5 text-amber-200">
            <i data-lucide="timer" class="h-3.5 w-3.5"></i>
            <span class="text-xs font-semibold">Proses</span>
          </div>
          <p data-tahfizh-stat="proses" class="truncate text-base font-bold leading-none text-white">0</p>
        </div>
      </div>
    </div>
  </div>

  <div id="tahfizh-home-overview" class="grid grid-cols-2 gap-2 lg:grid-cols-4"></div>

  <div id="tahfizh-jadwal-perpulangan-section"></div>

  <div class="grid grid-cols-1 gap-3 xl:grid-cols-[minmax(0,1.4fr)_minmax(320px,0.8fr)]">
    <div class="space-y-3">
      <section class="tahfizh-card rounded-2xl p-3 sm:p-4">
        <div class="mb-3 flex items-center justify-between gap-3">
          <div class="min-w-0">
            <h3 class="text-sm font-black text-slate-900 dark:text-white">Target Prioritas</h3>
            <p class="mt-0.5 text-[10px] font-bold text-slate-400">Pilih target dan lihat santri yang sudah tuntas atau perlu pendampingan.</p>
          </div>
          <i data-lucide="goal" class="h-5 w-5 shrink-0 text-orange-500"></i>
        </div>
        <div id="tahfizh-tuntas-tracking-section"></div>
      </section>
    </div>

    <aside class="space-y-3">
      <div id="tahfizh-focus-summary" class="tahfizh-card rounded-2xl p-3 sm:p-4"></div>
      <div id="tahfizh-peringkat-section" class="tahfizh-card rounded-2xl p-3 sm:p-4"></div>
      <div id="tahfizh-recent-activity" class="tahfizh-card rounded-2xl p-3 sm:p-4"></div>
    </aside>
  </div>
</section>
