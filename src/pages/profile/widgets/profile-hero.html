<div id="profile-hero-card-wrapper" class="relative z-30">
  <section
    id="profile-hero-card"
    class="bg-slate-950 dark:bg-black p-4 sm:p-5 rounded-[1.75rem] relative overflow-hidden border border-slate-800/70 text-white shadow-2xl shadow-slate-900/20"
    aria-labelledby="profile-name"
  >
    <div class="absolute inset-x-0 top-0 h-1 bg-gradient-to-r from-palette-blue via-palette-mint to-emerald-400"></div>
    <div class="absolute bottom-0 right-0 w-44 h-44 bg-palette-blue rounded-full blur-[80px] opacity-10 -mr-12 -mb-12 pointer-events-none"></div>
    <img src="assets/icons/icon.webp" class="absolute -right-10 -bottom-12 w-48 h-48 opacity-[0.06] pointer-events-none select-none z-0 rotate-[15deg]" alt="" />
    <div class="relative z-10 flex flex-col gap-4">
      <div class="flex items-start justify-between gap-4">
        <div class="flex items-center gap-3 min-w-0">
          <div class="w-16 h-16 sm:w-[4.5rem] sm:h-[4.5rem] bg-white/10 rounded-2xl p-1 border border-white/10 shadow-sm shrink-0">
            <div
              id="profile-avatar"
              class="w-full h-full bg-white rounded-xl flex items-center justify-center text-slate-500 overflow-hidden"
            >
              <i data-lucide="user" class="w-8 h-8"></i>
            </div>
          </div>

          <div class="min-w-0 text-left">
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Profil pengguna</p>
            <h2
              id="profile-name"
              class="text-lg sm:text-xl font-black text-white tracking-tight truncate"
            >
              ...
            </h2>
            <p
              id="profile-role-tab"
              class="mt-2 inline-flex max-w-full items-center justify-center px-2.5 py-1 rounded-full bg-emerald-400/10 border border-emerald-300/20 text-[10px] font-black text-palette-mint uppercase tracking-wider truncate whitespace-nowrap"
            >
              Administrator
            </p>
          </div>
        </div>

        <div class="flex items-center gap-2 shrink-0">
          <button
            onclick="window.manualSync()"
            id="pwa-sync-btn"
            class="profile-sync-btn h-10 w-10 inline-flex items-center justify-center rounded-xl bg-emerald-400/10 border border-emerald-300/20 text-emerald-300 hover:bg-emerald-400/20 active:scale-95 transition-all"
            title="Sinkronkan data"
            aria-label="Sinkronkan data"
          >
            <i data-lucide="refresh-cw" class="w-4 h-4"></i>
          </button>

          <button
            onclick="handleLogout()"
            class="profile-compact-logout hidden h-10 w-10 items-center justify-center rounded-xl bg-white/10 border border-white/10 text-white hover:bg-red-500/20 hover:text-red-100 active:scale-95 transition-all"
            title="Keluar"
            aria-label="Keluar dari akun"
          >
            <i data-lucide="log-out" class="w-4 h-4"></i>
          </button>
        </div>
      </div>

      <div class="grid grid-cols-2 gap-2">
        <div class="rounded-xl bg-white/[0.06] border border-white/10 p-3 text-left">
          <div class="flex items-center gap-2 text-slate-400 mb-2">
            <i data-lucide="activity" class="w-3.5 h-3.5"></i>
            <p class="text-[10px] font-bold uppercase tracking-wider">Rata-rata presensi</p>
          </div>
          <div
            class="text-2xl font-black text-white leading-none"
            id="profile-avg-attendance"
          >
            0%
          </div>
        </div>
        <div class="rounded-xl bg-white/[0.06] border border-white/10 p-3 text-left">
          <div class="flex items-center gap-2 text-slate-400 mb-2">
            <i data-lucide="calendar-check-2" class="w-3.5 h-3.5"></i>
            <p class="text-[10px] font-bold uppercase tracking-wider">Hari aktif</p>
          </div>
          <div
            class="text-2xl font-black text-palette-mint leading-none"
            id="profile-days-count"
          >
            0
          </div>
        </div>
      </div>
    </div>
  </section>
</div>
