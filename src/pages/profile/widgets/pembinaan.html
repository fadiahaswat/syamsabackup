<div
  id="pembinaan-section"
  class="bg-white dark:bg-slate-900 rounded-[1.75rem] p-4 border border-slate-200/80 dark:border-slate-800 shadow-xl shadow-slate-200/50 dark:shadow-black/30 relative"
>
  <div class="mb-3 flex items-center justify-between gap-3 border-b border-slate-100 pb-3 dark:border-slate-800">
    <div class="flex min-w-0 items-center gap-3">
      <div class="flex h-9 w-9 shrink-0 items-center justify-center rounded-xl bg-red-50 text-red-500 ring-1 ring-red-100 dark:bg-red-500/10 dark:ring-red-500/20">
        <i data-lucide="siren" class="h-4 w-4"></i>
      </div>
      <div class="min-w-0">
        <h3 class="truncate text-sm font-extrabold tracking-tight text-slate-900 dark:text-white">Zona Pembinaan</h3>
        <p class="truncate text-[11px] font-medium text-slate-500 dark:text-slate-400">Monitoring kedisiplinan santri</p>
      </div>
    </div>
    <button
      type="button"
      onclick="document.getElementById('pembinaan-thresholds')?.classList.toggle('hidden')"
      class="flex shrink-0 items-center gap-1.5 rounded-full border border-slate-200 bg-slate-50 px-2.5 py-1 text-[10px] font-bold text-slate-500 transition-colors hover:border-red-100 hover:bg-red-50 hover:text-red-600 dark:border-slate-700 dark:bg-slate-800/70 dark:text-slate-300 dark:hover:border-red-500/20 dark:hover:bg-red-500/10 dark:hover:text-red-300"
      title="Tampilkan/sembunyikan ambang poin"
    >
      <i data-lucide="sliders-horizontal" class="h-3 w-3"></i>
      Ambang
    </button>
  </div>

  <div class="mb-4 grid grid-cols-3 gap-2">
    <div class="rounded-xl border border-slate-100 bg-slate-50 p-2 dark:border-slate-700/50 dark:bg-slate-800/50">
      <div class="mb-1.5 flex h-6 w-6 items-center justify-center rounded-lg bg-amber-100 text-amber-500 dark:bg-amber-500/10">
        <i data-lucide="circle-alert" class="h-3.5 w-3.5"></i>
      </div>
      <div id="count-level-1" class="text-lg font-extrabold leading-none text-slate-950 dark:text-white">0</div>
      <div class="mt-1 text-[8px] font-black uppercase leading-tight text-slate-500 dark:text-slate-400">Bimbingan</div>
    </div>
    <div class="rounded-xl border border-slate-100 bg-slate-50 p-2 dark:border-slate-700/50 dark:bg-slate-800/50">
      <div class="mb-1.5 flex h-6 w-6 items-center justify-center rounded-lg bg-orange-100 text-orange-600 dark:bg-orange-500/10">
        <i data-lucide="triangle-alert" class="h-3.5 w-3.5"></i>
      </div>
      <div id="count-level-2" class="text-lg font-extrabold leading-none text-slate-950 dark:text-white">0</div>
      <div class="mt-1 text-[8px] font-black uppercase leading-tight text-slate-500 dark:text-slate-400">Pamong</div>
    </div>
    <div class="rounded-xl border border-slate-100 bg-slate-50 p-2 dark:border-slate-700/50 dark:bg-slate-800/50">
      <div class="mb-1.5 flex h-6 w-6 items-center justify-center rounded-lg bg-red-100 text-red-600 dark:bg-red-500/10">
        <i data-lucide="shield-alert" class="h-3.5 w-3.5"></i>
      </div>
      <div id="count-level-3" class="text-lg font-extrabold leading-none text-slate-950 dark:text-white">0</div>
      <div class="mt-1 text-[8px] font-black uppercase leading-tight text-slate-500 dark:text-slate-400">Direktur</div>
    </div>
  </div>

  <div class="mb-4">
    <div class="mb-2.5 flex items-center justify-between">
      <h4 class="text-[10px] font-extrabold uppercase tracking-wider text-slate-500 dark:text-slate-400">Feed Pelanggaran</h4>
      <span class="text-[10px] font-bold text-slate-400">Terbaru</span>
    </div>
    <div id="pembinaan-full-list" class="max-h-[260px] space-y-2 overflow-y-auto">
      <div class="rounded-3xl border border-dashed border-slate-200 bg-slate-50/60 px-4 py-8 text-center dark:border-slate-700 dark:bg-slate-950/30">
        <p class="text-xs font-bold text-slate-400">Tidak ada data pelanggaran aktif</p>
      </div>
    </div>
  </div>

  <div id="pembinaan-thresholds" class="border-t border-slate-100 pt-3 dark:border-slate-800">
    <div class="mb-2 flex h-2 overflow-hidden rounded-full bg-slate-100 dark:bg-slate-800">
      <div class="h-full w-[25%] bg-emerald-400"></div>
      <div class="h-full w-[25%] bg-amber-400"></div>
      <div class="h-full w-[25%] bg-orange-400"></div>
      <div class="h-full w-[25%] bg-rose-500"></div>
    </div>
    <div class="grid grid-cols-4 gap-1 text-center">
      <div><div class="text-[8px] font-black text-emerald-600 dark:text-emerald-400">Bimbingan</div><div class="text-[8px] text-slate-400">1-10</div></div>
      <div><div class="text-[8px] font-black text-amber-600 dark:text-amber-400">SP 1</div><div class="text-[8px] text-slate-400">11-20</div></div>
      <div><div class="text-[8px] font-black text-orange-600 dark:text-orange-400">SP 2</div><div class="text-[8px] text-slate-400">21-30</div></div>
      <div><div class="text-[8px] font-black text-rose-600 dark:text-rose-400">SP 3/T</div><div class="text-[8px] text-slate-400">&gt;31</div></div>
    </div>
  </div>
</div>
