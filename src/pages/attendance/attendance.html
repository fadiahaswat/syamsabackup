<section
      id="view-attendance"
      class="fixed inset-0 z-[60] bg-slate-50 dark:bg-[#0f172a] flex flex-col hidden transition-colors"
    >
      <!-- Sticky Hero-Style Header for Attendance Page (Floating & Transparent) -->
      <div class="absolute top-0 left-0 right-0 z-50 p-3 sm:p-4 pt-safe pointer-events-none">
        <div class="w-full max-w-md mx-auto pointer-events-auto">
          <!-- Dark Card persis seperti di dasbor tapi dengan tombol kembali di kiri -->
          <div class="bg-slate-900 dark:bg-black rounded-2xl p-2 sm:p-2.5 text-white shadow-xl flex items-center justify-between gap-3 relative overflow-hidden group min-w-0">
            <!-- Ambient glows -->
            <div class="absolute top-0 right-0 w-32 h-32 bg-emerald-500 rounded-full blur-[50px] opacity-20 -mr-8 -mt-8 pointer-events-none"></div>
            <div class="absolute bottom-0 left-0 w-24 h-24 bg-blue-600 rounded-full blur-[45px] opacity-10 -ml-5 -mb-5 pointer-events-none"></div>

            <div class="relative z-10 flex items-center justify-between gap-3 w-full min-w-0">
              <!-- KIRI: 4 Item Rata Kiri -->
              <div class="flex items-center gap-3 sm:gap-4 min-w-0 flex-1">
                <!-- Item 1: Tombol Kembali (Arrow Left) -->
                <button onclick="closeAttendance()" class="w-9 h-9 sm:w-10 sm:h-10 rounded-xl bg-white text-slate-900 flex items-center justify-center shadow-lg hover:scale-105 active:scale-95 transition-all shrink-0" aria-label="Tutup halaman presensi" title="Tutup">
                  <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-arrow-left w-4.5 h-4.5"><path d="m12 19-7-7 7-7"></path><path d="M19 12H5"></path></svg>
                </button>

                <!-- Item 2: Badge: SAAT INI dengan green dot -->
                <div class="flex-shrink-0">
                  <span class="px-2.5 py-1 rounded-lg bg-white/10 border border-white/5 text-[9px] sm:text-[10px] font-bold uppercase tracking-wider flex items-center gap-1.5">
                    <span class="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse"></span>
                    <span>SAAT INI</span>
                  </span>
                </div>
                
                <!-- Item 3: Nama Sesi -->
                <h2 id="att-slot-title" class="text-base sm:text-lg md:text-xl font-black text-white leading-none tracking-tight truncate flex-shrink-0">Shubuh</h2>
                
                <!-- Item 4: Durasi Sesi dengan Ikon Jam (Green/Emerald) -->
                <div id="att-slot-duration" class="text-emerald-400 text-[10px] sm:text-xs font-bold flex items-center gap-1.5 opacity-90 whitespace-nowrap flex-shrink-0">
                  <i data-lucide="clock" class="w-3.5 h-3.5"></i>
                  <span>--:--</span>
                </div>
              </div>

              <!-- KANAN: Autosave Indicator -->
              <div id="save-indicator" class="flex items-center gap-1.5 px-2.5 py-1 rounded-full bg-white/10 border border-white/10 shrink-0 text-slate-300 transition-all duration-300" title="Status Autosave" role="status" aria-live="polite">
                <i data-lucide="loader-2" class="w-3.5 h-3.5 animate-spin hidden" id="save-spinner"></i>
                <i data-lucide="check" class="w-3.5 h-3.5 text-emerald-400 hidden" id="save-check"></i>
                <i data-lucide="alert-circle" class="w-3.5 h-3.5 text-amber-400 hidden" id="save-warning"></i>
                <span id="save-text" class="text-[10px] font-semibold">Siap</span>
              </div>
            </div>
            
            <!-- Hidden elements to keep JS references working without errors -->
            <div class="hidden">
              <span id="att-date-display"></span>
              <button id="connection-status-btn"></button>
              <div id="att-gps-status"></div>
            </div>
          </div>
        </div>
      </div>

      <div
        id="attendance-list-container"
        class="flex-1 overflow-y-auto p-4 pt-24 sm:pt-28 pb-32 space-y-3 scroll-smooth"
      >
        <!-- Items Injected by JS -->
      </div>

      <div id="att-summary-widget" class="fixed bottom-20 left-4 right-4 sm:left-auto sm:right-6 sm:w-[380px] bg-white/90 dark:bg-slate-900/90 backdrop-blur-2xl rounded-[1.25rem] shadow-[0_10px_40px_rgb(0,0,0,0.08)] dark:shadow-[0_10px_40px_rgb(0,0,0,0.3)] border border-slate-200/60 dark:border-slate-700/50 p-2.5 sm:p-3 hidden z-50 animate-slide-up transition-all">
        <div class="flex items-start justify-between gap-3">
          <div class="flex items-center gap-1.5 overflow-x-auto no-scrollbar pb-0.5 mask-image-r flex-1" id="att-summary-badges">
            <!-- Dynamic Badges -->
          </div>
          <button onclick="document.getElementById('att-summary-widget').classList.add('hidden')" class="w-7 h-7 flex items-center justify-center shrink-0 rounded-full bg-slate-100 dark:bg-slate-800 text-slate-400 hover:text-slate-700 dark:hover:text-white transition-colors active:scale-90">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-x w-3.5 h-3.5"><path d="M18 6 6 18"></path><path d="m6 6 12 12"></path></svg>
          </button>
        </div>
        <div id="att-summary-detail" class="hidden mt-2 pt-2 border-t border-slate-100 dark:border-slate-800">
          <div class="flex items-center justify-between px-1 mb-2">
            <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Detail Santri</p>
          </div>
          <div id="att-summary-names" class="flex flex-wrap gap-1.5">
            <!-- Dynamic Names -->
          </div>
        </div>
        <div class="mt-2 flex justify-center">
          <button onclick="
              document.getElementById('att-summary-detail').classList.toggle('hidden');
              document.getElementById('toggle-detail-icon').classList.toggle('rotate-180');
            " class="px-3 py-1 rounded-full bg-slate-100/80 dark:bg-slate-800/80 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors text-[9px] font-black text-slate-500 dark:text-slate-400 flex items-center justify-center gap-1 shadow-sm">
            Detail
            <svg id="toggle-detail-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="w-3 h-3 transition-transform duration-300"><path d="m6 9 6 6 6-6"></path></svg>
          </button>
        </div>
      </div>

      <!-- Floating Bottom Action/Search Bar (Compact & Morphing Pill) -->
      <div id="att-bottom-bar" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-40 flex items-center gap-2.5 collapsed">
        <!-- Search Container -->
        <div id="search-pill-container" onclick="document.getElementById('att-bottom-bar').classList.add('expanded'); document.getElementById('att-bottom-bar').classList.remove('collapsed'); document.getElementById('att-search').focus();" class="relative flex items-center bg-white/95 dark:bg-slate-900/95 backdrop-blur-xl border border-slate-200/50 dark:border-slate-800/60 shadow-[0_10px_35px_rgba(0,0,0,0.12)] h-12 rounded-full overflow-hidden cursor-pointer">
          <!-- Single Search Icon (Always on the left, centered when collapsed) -->
          <div class="absolute left-3.5 text-slate-700 dark:text-white pointer-events-none flex items-center justify-center w-5 h-5">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-search w-4 h-4"><path d="m21 21-4.34-4.34"></path><circle cx="11" cy="11" r="8"></circle></svg>
          </div>
          
          <!-- Full Search Input (visible content) -->
          <div class="w-full h-full flex items-center pl-11 pr-10">
            <input type="text" id="att-search" oninput="handleSearch(this.value)" placeholder="Cari nama santri..." class="w-full h-full bg-transparent border-none text-[11px] sm:text-xs font-semibold text-slate-800 dark:text-white placeholder:text-slate-400 outline-none">
            <button onclick="event.stopPropagation(); toggleProblemFilter()" id="btn-filter-problem" class="absolute right-2 w-7 h-7 flex items-center justify-center rounded-full text-slate-400 hover:text-rose-500 hover:bg-rose-50 dark:hover:bg-rose-500/10 transition-colors active:scale-95" title="Filter Santri Bermasalah">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-filter w-3.5 h-3.5"><path d="M10 20a1 1 0 0 0 .553.895l2 1A1 1 0 0 0 14 21v-7a2 2 0 0 1 .517-1.341L21.74 4.67A1 1 0 0 0 21 3H3a1 1 0 0 0-.742 1.67l7.225 7.989A2 2 0 0 1 10 14z"></path></svg>
            </button>
          </div>
        </div>

        <!-- Bulk Action Button -->
        <button onclick="window.openBulkMenu()" class="h-12 px-4 flex items-center justify-center gap-2 rounded-full bg-slate-900 dark:bg-black text-white hover:bg-slate-800 dark:hover:bg-slate-900 shadow-[0_10px_35px_rgba(0,0,0,0.12)] border border-white/5 active:scale-95 transition-all shrink-0" aria-label="Buka aksi massal presensi" title="Aksi massal presensi">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-layers w-4.5 h-4.5"><path d="M12.83 2.18a2 2 0 0 0-1.66 0L2.6 6.08a1 1 0 0 0 0 1.83l8.58 3.91a2 2 0 0 0 1.66 0l8.58-3.9a1 1 0 0 0 0-1.83z"></path><path d="M2 12a1 1 0 0 0 .58.91l8.6 3.91a2 2 0 0 0 1.65 0l8.58-3.9A1 1 0 0 0 22 12"></path><path d="M2 17a1 1 0 0 0 .58.91l8.6 3.91a2 2 0 0 0 1.65 0l8.58-3.9A1 1 0 0 0 22 17"></path></svg>
          <span class="text-xs font-black">Aksi</span>
        </button>
      </div>
    </section>
