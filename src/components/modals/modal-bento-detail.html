<div id="bento-detail-modal" class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-950/60 backdrop-blur-md hidden opacity-0 transition-opacity duration-300">
  <div id="bento-modal-content" class="bg-white dark:bg-slate-900 rounded-[1.75rem] border border-slate-100 dark:border-slate-800/80 w-full max-w-sm overflow-hidden shadow-2xl transform scale-95 transition-transform duration-300 flex flex-col">
    <div id="bento-modal-header" class="relative p-6 text-white flex flex-col justify-end min-h-[130px] bg-emerald-500">
      <button onclick="window.closeBentoModal()" class="absolute top-4 right-4 w-8 h-8 rounded-full bg-black/20 hover:bg-black/40 flex items-center justify-center text-white transition-colors" aria-label="Tutup detail sesi">
        <i data-lucide="x" class="w-4 h-4"></i>
      </button>

      <div class="flex items-center gap-3">
        <div id="bento-modal-icon-bg" class="w-12 h-12 rounded-2xl flex items-center justify-center bg-white/20 backdrop-blur-md border border-white/10 text-white">
          <i id="bento-modal-icon" class="w-6 h-6 block text-current"></i>
        </div>
        <div>
          <h3 id="bento-modal-title" class="font-black text-xl tracking-tight leading-none mb-1">Shubuh</h3>
          <span id="bento-modal-time" class="text-xs opacity-80 font-mono">04:00 - 06:00</span>
        </div>
      </div>
    </div>

    <div class="p-6 space-y-4">
      <div class="flex justify-between items-center">
        <span class="text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider">Status Kegiatan</span>
        <span id="bento-modal-status" class="text-[10px] font-bold px-2.5 py-0.5 rounded-lg border">Menunggu</span>
      </div>

      <div class="bg-slate-50 dark:bg-slate-800/40 p-3 rounded-2xl border border-slate-100 dark:border-slate-800/50">
        <div class="flex justify-between text-[10px] font-bold text-slate-500 dark:text-slate-400 mb-1.5 uppercase tracking-wider">
          <span>Tingkat Kehadiran</span>
          <span id="bento-modal-progress-text" class="font-black">0%</span>
        </div>
        <div class="w-full h-2 bg-slate-200 dark:bg-slate-700 rounded-full overflow-hidden">
          <div id="bento-modal-progress-bar" class="h-full rounded-full w-0 transition-all duration-500"></div>
        </div>
      </div>

      <div>
        <span class="text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider block mb-2">Statistik Kehadiran</span>
        <div class="grid grid-cols-6 gap-1.5">
          <div class="flex flex-col items-center py-2 rounded-xl bg-slate-50 dark:bg-slate-800/40 border border-slate-100 dark:border-slate-800/50"><span class="text-[9px] font-black text-emerald-500 dark:text-emerald-400">H</span><span id="bento-modal-h" class="text-xs font-black text-slate-700 dark:text-slate-200">0</span></div>
          <div class="flex flex-col items-center py-2 rounded-xl bg-slate-50 dark:bg-slate-800/40 border border-slate-100 dark:border-slate-800/50"><span class="text-[9px] font-black text-cyan-500 dark:text-cyan-400">T</span><span id="bento-modal-t" class="text-xs font-black text-slate-700 dark:text-slate-200">0</span></div>
          <div class="flex flex-col items-center py-2 rounded-xl bg-slate-50 dark:bg-slate-800/40 border border-slate-100 dark:border-slate-800/50"><span class="text-[9px] font-black text-blue-500 dark:text-blue-400">I</span><span id="bento-modal-i" class="text-xs font-black text-slate-700 dark:text-slate-200">0</span></div>
          <div class="flex flex-col items-center py-2 rounded-xl bg-slate-50 dark:bg-slate-800/40 border border-slate-100 dark:border-slate-800/50"><span class="text-[9px] font-black text-amber-500 dark:text-amber-400">S</span><span id="bento-modal-s" class="text-xs font-black text-slate-700 dark:text-slate-200">0</span></div>
          <div class="flex flex-col items-center py-2 rounded-xl bg-slate-50 dark:bg-slate-800/40 border border-slate-100 dark:border-slate-800/50"><span class="text-[9px] font-black text-purple-500 dark:text-purple-400">P</span><span id="bento-modal-p" class="text-xs font-black text-slate-700 dark:text-slate-200">0</span></div>
          <div class="flex flex-col items-center py-2 rounded-xl bg-slate-50 dark:bg-slate-800/40 border border-slate-100 dark:border-slate-800/50"><span class="text-[9px] font-black text-red-500 dark:text-red-400">A</span><span id="bento-modal-a" class="text-xs font-black text-slate-700 dark:text-slate-200">0</span></div>
        </div>
      </div>
    </div>

    <div class="p-6 pt-0 mt-auto">
      <button id="bento-modal-cta" class="w-full py-3.5 rounded-2xl font-bold text-sm bg-emerald-500 hover:bg-emerald-600 text-white shadow-lg shadow-emerald-500/20 active:scale-95 transition-all flex items-center justify-center gap-2">
        <i data-lucide="check-square" class="w-4 h-4"></i>
        <span>Isi Presensi</span>
      </button>
    </div>
  </div>
</div>
