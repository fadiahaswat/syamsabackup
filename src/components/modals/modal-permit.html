<div
      id="modal-permit"
      class="fixed inset-0 z-[100] bg-slate-900/60 backdrop-blur-md hidden flex items-end sm:items-center justify-center p-4 transition-all"
    >
      <div
        class="bg-white dark:bg-slate-900 w-full max-w-lg rounded-[1.75rem] p-6 animate-slide-up border border-white/10 shadow-2xl flex flex-col max-h-[90vh]"
      >
        <div class="flex justify-between items-center mb-4">
          <div>
            <h3 class="text-xl font-black text-slate-800 dark:text-white">
              Input Perizinan
            </h3>
            <p class="text-xs text-slate-500 mt-1">Sakit, Izin, atau Pulang</p>
          </div>
          <button
            onclick="window.closeModal('modal-permit')"
            class="p-2 rounded-full bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 transition-colors"
          >
            <i data-lucide="x" class="w-5 h-5"></i>
          </button>
        </div>

        <div class="flex-1 overflow-y-auto pr-1 pb-4 hide-scrollbar space-y-4">
          <div class="flex p-1 bg-slate-100 dark:bg-slate-800 rounded-xl">
            <button
              onclick="window.setPermitTab('sakit')"
              id="tab-btn-sakit"
              class="permit-tab flex-1 py-2 rounded-lg text-xs font-bold transition-all bg-white shadow-sm text-amber-600"
            >
              Sakit
            </button>
            <button
              onclick="window.setPermitTab('izin')"
              id="tab-btn-izin"
              class="permit-tab flex-1 py-2 rounded-lg text-xs font-bold transition-all text-slate-500"
            >
              Izin
            </button>
            <button
              onclick="window.setPermitTab('pulang')"
              id="tab-btn-pulang"
              class="permit-tab flex-1 py-2 rounded-lg text-xs font-bold transition-all text-slate-500"
            >
              Pulang
            </button>
          </div>

          <div
            class="bg-slate-50 dark:bg-slate-800/50 p-4 rounded-3xl border border-slate-100 dark:border-slate-700"
          >
            <div class="mb-3">
              <div class="flex justify-between items-end mb-2">
                <label
                  class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1"
                  >Pilih Santri</label
                >
                <button
                  onclick="window.toggleSelectAllPermit()"
                  class="text-[10px] font-bold text-indigo-500 hover:text-indigo-600 transition-colors"
                  id="btn-select-all-permit"
                >
                  Pilih Semua
                </button>
                <span
                  class="text-[10px] font-bold text-emerald-500 bg-emerald-50 dark:bg-emerald-900/30 px-2 py-0.5 rounded-md"
                >
                  <span id="permit-selected-count">0</span> Dipilih
                </span>
              </div>
              <div class="relative">
                <i
                  data-lucide="search"
                  class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"
                ></i>
                <input
                  type="text"
                  id="permit-search-santri"
                  oninput="window.filterPermitSantri(this.value)"
                  placeholder="Cari santri..."
                  class="w-full pl-10 pr-4 py-3 rounded-xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 font-bold text-sm outline-none focus:border-emerald-500 transition-all"
                />
              </div>
            </div>
            <div
              id="permit-santri-checklist"
              class="grid grid-cols-2 gap-2 max-h-40 overflow-y-auto pr-1 custom-scrollbar"
            ></div>
          </div>

          <div
            id="form-permit-container"
            class="bg-slate-50 dark:bg-slate-800/50 p-4 rounded-3xl border border-slate-100 dark:border-slate-700 space-y-3"
          >
            <div>
              <label
                class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1 mb-1 block"
                id="lbl-reason"
                >Sakit Apa?</label
              >
              <input
                list="reasons-list"
                type="text"
                id="permit-reason"
                class="w-full p-3 rounded-xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 font-bold text-sm outline-none focus:border-emerald-500"
                placeholder="Ketik atau pilih..."
              />
              <datalist id="reasons-list"> </datalist>
            </div>

            <div id="field-location" class="hidden">
              <label
                class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1 mb-1 block"
                >Lokasi Sakit</label
              >
              <div class="grid grid-cols-3 gap-2">
                <label class="cursor-pointer">
                  <input
                    type="radio"
                    name="loc_sakit"
                    value="Asrama"
                    class="peer hidden"
                    checked
                  />
                  <div
                    class="py-2 px-3 rounded-xl bg-white dark:bg-slate-900 border border-slate-200 peer-checked:bg-amber-100 peer-checked:text-amber-700 peer-checked:border-amber-300 text-center text-xs font-bold transition-all"
                  >
                    Asrama
                  </div>
                </label>
                <label class="cursor-pointer">
                  <input
                    type="radio"
                    name="loc_sakit"
                    value="Rumah"
                    class="peer hidden"
                  />
                  <div
                    class="py-2 px-3 rounded-xl bg-white dark:bg-slate-900 border border-slate-200 peer-checked:bg-amber-100 peer-checked:text-amber-700 peer-checked:border-amber-300 text-center text-xs font-bold transition-all"
                  >
                    Rumah
                  </div>
                </label>
                <label class="cursor-pointer">
                  <input
                    type="radio"
                    name="loc_sakit"
                    value="RS"
                    class="peer hidden"
                  />
                  <div
                    class="py-2 px-3 rounded-xl bg-white dark:bg-slate-900 border border-slate-200 peer-checked:bg-amber-100 peer-checked:text-amber-700 peer-checked:border-amber-300 text-center text-xs font-bold transition-all"
                  >
                    RS
                  </div>
                </label>
                <label class="cursor-pointer">
                  <input
                    type="radio"
                    name="loc_sakit"
                    value="Klinik"
                    class="peer hidden"
                  />
                  <div
                    class="py-2 px-3 rounded-xl bg-white dark:bg-slate-900 border border-slate-200 peer-checked:bg-amber-100 peer-checked:text-amber-700 peer-checked:border-amber-300 text-center text-xs font-bold transition-all"
                  >
                    Klinik
                  </div>
                </label>
                <label class="cursor-pointer">
                  <input
                    type="radio"
                    name="loc_sakit"
                    value="Dokter"
                    class="peer hidden"
                  />
                  <div
                    class="py-2 px-3 rounded-xl bg-white dark:bg-slate-900 border border-slate-200 peer-checked:bg-amber-100 peer-checked:text-amber-700 peer-checked:border-amber-300 text-center text-xs font-bold transition-all"
                  >
                    Dokter
                  </div>
                </label>
                <label class="cursor-pointer">
                  <input
                    type="radio"
                    name="loc_sakit"
                    value="Lainnya"
                    class="peer hidden"
                  />
                  <div
                    class="py-2 px-3 rounded-xl bg-white dark:bg-slate-900 border border-slate-200 peer-checked:bg-amber-100 peer-checked:text-amber-700 peer-checked:border-amber-300 text-center text-xs font-bold transition-all"
                  >
                    Lainnya
                  </div>
                </label>
              </div>
            </div>

            <div id="field-transport" class="hidden space-y-2">
              <div class="grid grid-cols-2 gap-2">
                <select
                  id="permit-pickup"
                  class="p-3 rounded-xl bg-white dark:bg-slate-900 border border-slate-200 text-xs font-bold"
                >
                  <option value="Dijemput">Dijemput</option>
                  <option value="Sendiri">Pulang Sendiri</option>
                  <option value="Rombongan">Rombongan</option>
                </select>
                <select
                  id="permit-vehicle"
                  class="p-3 rounded-xl bg-white dark:bg-slate-900 border border-slate-200 text-xs font-bold"
                >
                  <option value="Mobil Pribadi">Mobil Pribadi</option>
                  <option value="Motor">Motor</option>
                  <option value="Bus Umum">Bus Umum</option>
                  <option value="Kereta">Kereta</option>
                  <option value="Pesawat">Pesawat</option>
                  <option value="Kapal">Kapal</option>
                </select>
              </div>
            </div>

            <div class="grid grid-cols-2 gap-2">
              <div>
                <label
                  class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1 mb-1 block"
                  >Mulai Tanggal</label
                >
                <input
                  type="date"
                  id="permit-start-date"
                  class="w-full p-2.5 rounded-xl bg-white dark:bg-slate-900 border border-slate-200 font-bold text-xs"
                />
              </div>
              <div>
                <label
                  class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1 mb-1 block"
                  >Mulai Sesi</label
                >
                <select
                  id="permit-start-session"
                  class="w-full p-2.5 rounded-xl bg-white dark:bg-slate-900 border border-slate-200 font-bold text-xs"
                >
                  <option value="shubuh">Shubuh</option>
                  <option value="sekolah">Sekolah</option>
                  <option value="ashar">Ashar</option>
                  <option value="maghrib">Maghrib</option>
                  <option value="isya">Isya</option>
                </select>
              </div>
            </div>

            <div id="field-end-time" class="grid grid-cols-2 gap-2">
              <div>
                <label
                  class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1 mb-1 block"
                  >Sampai Tanggal</label
                >
                <input
                  type="date"
                  id="permit-end-date"
                  class="w-full p-2.5 rounded-xl bg-white dark:bg-slate-900 border border-slate-200 font-bold text-xs"
                />
              </div>
              <div>
                <label
                  class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1 mb-1 block"
                  >Sampai Jam</label
                >
                <input
                  type="time"
                  id="permit-end-time"
                  class="w-full p-2.5 rounded-xl bg-white dark:bg-slate-900 border border-slate-200 font-bold text-xs"
                  value="17:00"
                />
              </div>
            </div>

            <div
              id="info-sakit"
              class="hidden space-y-2"
            >
              <div class="text-[10px] text-amber-600 font-bold bg-amber-50 p-2 rounded-lg text-center">
                <i data-lucide="info" class="w-3 h-3 inline mr-1"></i> Maksimal sakit 2 hari tanpa surat dokter.
              </div>

              <!-- Estimasi Selesai Sakit -->
              <div>
                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1 mb-1 block">
                  Estimasi Selesai
                </label>
                <input
                  type="date"
                  id="permit-end-date-sick"
                  class="w-full p-2.5 rounded-xl bg-white dark:bg-slate-900 border border-slate-200 font-bold text-xs"
                  min=""
                />
                <p id="sick-duration-info" class="text-[9px] text-slate-400 mt-1 ml-1"></p>
              </div>

              <!-- Surat Dokter (jika lebih dari 2 hari) -->
              <div id="field-surat-dokter" class="hidden">
                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1 mb-1 block">
                  Surat Keterangan Dokter <span class="text-red-500">*</span>
                </label>
                <div class="relative">
                  <input
                    type="file"
                    id="permit-surat-dokter"
                    accept="image/*,.pdf"
                    class="hidden"
                    onchange="window.handleSuratDokterChange(this)"
                  />
                  <label
                    for="permit-surat-dokter"
                    class="flex items-center justify-center gap-2 p-3 rounded-xl bg-amber-50 dark:bg-amber-900/20 border border-dashed border-amber-300 dark:border-amber-700 cursor-pointer hover:bg-amber-100 transition-colors"
                  >
                    <i data-lucide="file-text" class="w-4 h-4 text-amber-600"></i>
                    <span id="surat-dokter-label" class="text-xs font-bold text-amber-600">Upload Surat Dokter</span>
                  </label>
                </div>
                <p class="text-[9px] text-red-500 mt-1 ml-1 hidden" id="surat-dokter-error">Surat dokter wajib diupload jika sakit lebih dari 2 hari</p>
              </div>
            </div>

            <button
              onclick="window.savePermitLogic()"
              class="w-full py-3.5 bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold rounded-2xl shadow-lg active:scale-[0.98] transition-all flex items-center justify-center gap-2 mt-2"
            >
              <i data-lucide="save" class="w-4 h-4"></i> Simpan Data
            </button>
          </div>

          <div class="h-px bg-slate-200 dark:bg-slate-700 my-2"></div>

          <div>
            <h4
              class="font-bold text-slate-800 dark:text-white text-sm mb-3 px-1 flex items-center gap-2"
            >
              <i data-lucide="list-checks" class="w-4 h-4 text-slate-400"></i>
              Izin Aktif / Belum Kembali
            </h4>
            <div id="permit-list-container" class="space-y-2 pb-6"></div>
          </div>
        </div>
      </div>
    </div>
