<div
  id="modal-input-pelanggaran"
  class="fixed inset-0 z-[100] bg-slate-900/80 backdrop-blur-md hidden items-center justify-center p-4"
  role="dialog"
  aria-modal="true"
  aria-labelledby="violation-modal-title"
>
  <div
    class="bg-white dark:bg-slate-900 w-full max-w-sm rounded-[1.75rem] p-5 sm:p-6 animate-slide-up shadow-2xl border border-slate-100 dark:border-slate-800"
  >
    <div class="flex items-center justify-between border-b border-slate-100 dark:border-slate-800 pb-3 mb-4">
      <h3
        id="violation-modal-title"
        class="text-sm font-black text-slate-800 dark:text-white flex items-center gap-2"
      >
        <i data-lucide="shield-alert" class="w-4 h-4 text-red-500"></i> Catat Pelanggaran Santri
      </h3>
      <button
        onclick="window.closeModal('modal-input-pelanggaran')"
        class="w-8 h-8 rounded-full bg-slate-50 dark:bg-slate-800 flex items-center justify-center text-slate-400 hover:text-slate-600 dark:hover:text-white active:scale-95 transition-all"
        aria-label="Tutup form pelanggaran"
      >
        <i data-lucide="x" class="w-4 h-4"></i>
      </button>
    </div>

    <form onsubmit="event.preventDefault(); window.saveQuickViolationEntry();" class="space-y-4">
      <!-- Santri Selector -->
      <div>
        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-wider mb-1">Pilih Santri</label>
        <select id="violation-student-select" required class="w-full rounded-xl bg-slate-50 dark:bg-slate-950 border border-slate-200/60 dark:border-slate-800 p-3 text-xs font-bold focus:outline-none focus:border-red-500">
          <option value="" disabled selected>-- Pilih Santri --</option>
        </select>
      </div>

      <!-- Tipe Pelanggaran -->
      <div>
        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-wider mb-1">Jenis Pelanggaran</label>
        <select id="violation-type-select" onchange="window.updateViolationPointsLabel()" required class="w-full rounded-xl bg-slate-50 dark:bg-slate-950 border border-slate-200/60 dark:border-slate-800 p-3 text-xs font-bold focus:outline-none focus:border-red-500">
          <option value="Kabur dari Asrama" data-points="50">Kabur dari Asrama (50 Poin)</option>
          <option value="Merusak Fasilitas" data-points="30">Merusak Fasilitas Ma'had (30 Poin)</option>
          <option value="Membawa HP / Elektronik" data-points="20">Membawa HP / Elektronik (20 Poin)</option>
          <option value="Melanggar Aturan Busana" data-points="10">Melanggar Aturan Busana (10 Poin)</option>
          <option value="Terlambat Sesi Shalat" data-points="5">Terlambat Sesi Shalat (5 Poin)</option>
          <option value="Lainnya" data-points="10">Lainnya (10 Poin)</option>
        </select>
      </div>

      <!-- Keterangan -->
      <div>
        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-wider mb-1">Keterangan / Rincian</label>
        <textarea id="violation-note" required rows="3" placeholder="Tulis alasan atau rincian pelanggaran..." class="w-full rounded-xl bg-slate-50 dark:bg-slate-950 border border-slate-200/60 dark:border-slate-800 p-3 text-xs font-bold focus:outline-none focus:border-red-500 resize-none"></textarea>
      </div>

      <!-- Buttons -->
      <div class="flex gap-3 pt-2">
        <button
          type="button"
          onclick="window.closeModal('modal-input-pelanggaran')"
          class="flex-1 py-3 rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-white font-black text-xs transition-all active:scale-[0.98] hover:bg-slate-200 dark:hover:bg-slate-700"
        >
          Batal
        </button>
        <button
          type="submit"
          class="flex-1 py-3 rounded-xl bg-red-500 text-white font-black text-xs transition-all active:scale-[0.98] hover:bg-red-600 shadow-lg shadow-red-500/20"
        >
          Simpan Pelanggaran
        </button>
      </div>
    </form>
  </div>
</div>
