<div
  id="modal-confirm"
  class="fixed inset-0 z-[100] bg-slate-900/80 backdrop-blur-md hidden items-center justify-center p-4"
  role="dialog"
  aria-modal="true"
  aria-labelledby="confirm-title"
>
  <div
    class="bg-white dark:bg-slate-900 w-full max-w-sm rounded-3xl p-6 animate-slide-up shadow-2xl border border-slate-100 dark:border-slate-800"
  >
    <div
      class="w-14 h-14 rounded-full bg-red-50 dark:bg-red-900/20 mx-auto mb-4 flex items-center justify-center"
    >
      <i data-lucide="alert-triangle" class="w-7 h-7 text-red-500"></i>
    </div>
    <h3
      id="confirm-title"
      class="text-base font-black text-slate-800 dark:text-white mb-2 text-center"
    >
      Konfirmasi
    </h3>
    <p
      id="confirm-message"
      class="text-sm text-slate-600 dark:text-slate-400 mb-6 leading-relaxed text-center"
    >
      ...
    </p>
    <div class="flex gap-3">
      <button
        id="confirm-no"
        class="flex-1 py-3 rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-white font-bold text-sm transition-all active:scale-[0.98] hover:bg-slate-200 dark:hover:bg-slate-700"
      >
        Batal
      </button>
      <button
        id="confirm-yes"
        class="flex-1 py-3 rounded-xl bg-red-500 text-white font-bold text-sm transition-all active:scale-[0.98] hover:bg-red-600 shadow-lg shadow-red-500/30"
      >
        Ya, Lanjutkan
      </button>
    </div>
  </div>
</div>
