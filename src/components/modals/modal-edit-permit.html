<div id="modal-edit-permit" class="fixed inset-0 z-[60] hidden">
  <div
    class="absolute inset-0 bg-black/60 backdrop-blur-sm transition-opacity"
    onclick="window.closeModal('modal-edit-permit')"
  ></div>
  <div
    class="absolute bottom-0 md:top-1/2 md:left-1/2 md:transform md:-translate-x-1/2 md:-translate-y-1/2 w-full md:w-[400px] bg-white dark:bg-slate-900 rounded-t-3xl md:rounded-3xl p-6 shadow-2xl transition-transform animate-slide-up"
  >
    <div class="flex justify-between items-center mb-6">
      <h3 class="text-lg font-black text-slate-800 dark:text-white">
        Edit Data Izin
      </h3>
      <button
        onclick="window.closeModal('modal-edit-permit')"
        class="p-2 bg-slate-100 dark:bg-slate-800 rounded-full hover:bg-slate-200"
      >
        <i data-lucide="x" class="w-5 h-5 text-slate-500"></i>
      </button>
    </div>

    <input type="hidden" id="edit-permit-id" />

    <div class="space-y-4">
      <div>
        <label class="block text-xs font-bold text-slate-500 mb-1">
          Alasan / Keterangan
        </label>
        <input
          type="text"
          id="edit-permit-reason"
          class="w-full p-3 rounded-xl bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-sm font-bold focus:ring-2 focus:ring-indigo-500 outline-none"
        />
      </div>

      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-xs font-bold text-slate-500 mb-1">
            Mulai
          </label>
          <input
            type="date"
            id="edit-permit-start"
            class="w-full p-3 rounded-xl bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-xs font-bold"
          />
        </div>
        <div>
          <label class="block text-xs font-bold text-slate-500 mb-1">
            Selesai (Opsional)
          </label>
          <input
            type="date"
            id="edit-permit-end"
            class="w-full p-3 rounded-xl bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-xs font-bold"
          />
        </div>
      </div>

      <div
        class="flex items-center justify-between p-3 rounded-xl bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700"
      >
        <span class="text-xs font-bold text-slate-600 dark:text-slate-300">
          Status Izin Aktif
        </span>
        <label class="relative inline-flex items-center cursor-pointer">
          <input
            type="checkbox"
            id="edit-permit-active"
            class="sr-only peer"
          />
          <div
            class="w-11 h-6 bg-slate-200 peer-focus:outline-none rounded-full peer dark:bg-slate-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-emerald-500"
          ></div>
        </label>
      </div>
    </div>

    <div
      class="mt-6 pt-4 border-t border-slate-100 dark:border-slate-800 flex gap-3"
    >
      <button
        onclick="window.closeModal('modal-edit-permit')"
        class="flex-1 py-3 rounded-xl bg-slate-100 text-slate-500 font-bold text-sm"
      >
        Batal
      </button>
      <button
        onclick="window.savePermitEdit()"
        class="flex-1 py-3 rounded-xl bg-indigo-600 text-white font-bold text-sm shadow-lg shadow-indigo-500/30"
      >
        Simpan Perubahan
      </button>
    </div>
  </div>
</div>
