<div
  id="modal-input-pembinaan"
  class="hidden fixed inset-0 z-[60] flex items-center justify-center bg-black/50 backdrop-blur-sm p-4 transition-all"
>
  <div
    class="bg-white dark:bg-slate-800 w-full max-w-sm rounded-2xl shadow-2xl overflow-hidden transform scale-100 transition-all"
  >
    <div
      class="bg-slate-50 dark:bg-slate-900 p-4 border-b border-slate-100 dark:border-slate-700 flex justify-between items-center"
    >
      <h3
        class="font-bold text-slate-700 dark:text-white flex items-center gap-2"
      >
        <i
          data-lucide="heart-handshake"
          class="w-5 h-5 text-emerald-500"
        ></i>
        Lakukan Pembinaan
      </h3>
      <button
        onclick="document.getElementById('modal-input-pembinaan').classList.add('hidden')"
        class="text-slate-400 hover:text-red-500 transition-colors"
        aria-label="Tutup form pembinaan"
        title="Tutup"
      >
        <i data-lucide="x" class="w-5 h-5"></i>
      </button>
    </div>

    <div class="p-5 space-y-4">
      <div
        class="bg-amber-50 dark:bg-amber-900/20 p-3 rounded-xl border border-amber-100 dark:border-amber-800/50 flex gap-3 items-center"
      >
        <div
          class="w-10 h-10 rounded-full bg-white dark:bg-slate-800 flex items-center justify-center font-black text-amber-500 shadow-sm"
          id="bina-avatar"
        >
          --
        </div>
        <div>
          <h4
            id="bina-nama"
            class="font-bold text-slate-800 dark:text-white text-sm"
          >
            Nama Santri
          </h4>
          <p
            id="bina-detail"
            class="text-[10px] text-slate-500 dark:text-slate-400"
          >
            Shubuh - 20 Okt 2025
          </p>
        </div>
      </div>

      <div>
        <label
          class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1"
        >
          Tanggal Pembinaan
        </label>
        <input
          type="date"
          id="bina-date"
          class="w-full p-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 text-sm font-bold focus:ring-2 focus:ring-emerald-500 outline-none transition-all"
        />
      </div>

      <div>
        <label
          class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1"
        >
          Bentuk Pembinaan / Nasihat
        </label>
        <textarea
          id="bina-action"
          rows="3"
          placeholder="Contoh: Ditegur lisan, Diberi nasihat 4 mata, Menulis istighfar..."
          class="w-full p-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 text-sm focus:ring-2 focus:ring-emerald-500 outline-none transition-all"
        ></textarea>
      </div>

      <input type="hidden" id="bina-target-data" />
    </div>

    <div
      class="p-4 bg-slate-50 dark:bg-slate-900 border-t border-slate-100 dark:border-slate-700 flex justify-end gap-2"
    >
      <button
        onclick="document.getElementById('modal-input-pembinaan').classList.add('hidden')"
        class="px-4 py-2 rounded-xl text-slate-500 font-bold text-xs hover:bg-slate-200 transition-all"
      >
        Batal
      </button>
      <button
        onclick="window.savePembinaan()"
        class="px-6 py-2 rounded-xl bg-emerald-500 text-white font-bold text-xs shadow-lg shadow-emerald-500/30 hover:bg-emerald-600 active:scale-95 transition-all flex items-center gap-2"
      >
        <i data-lucide="check-circle" class="w-4 h-4"></i> Selesai Dibina
      </button>
    </div>
  </div>
</div>
